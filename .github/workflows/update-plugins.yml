name: Update plugins

on:
  schedule:
    # GitHub Actions schedules use UTC.
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-plugins
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Refresh plugin metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run --no-project python update_plugins.py --refresh-pypi

      - name: Commit and push changes
        run: |
          git add plugins.json
          if git diff --cached --quiet; then
            echo "plugins.json is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update plugins.json"
          git push
